name: Docs

# Build the Sphinx documentation and deploy it to GitHub Pages.
#
# One-time setup: in the repository settings, under Pages, set the source to
# "GitHub Actions". The `github-pages` environment is created automatically on
# the first deploy.

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "src/wijjit/**"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

# Allow the deploy job to publish to Pages via OIDC.
permissions:
  contents: read
  pages: write
  id-token: write

# Serialize Pages deployments; don't cancel an in-progress one.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Build Sphinx site
        # -W turns warnings into errors; the docs build is warning-clean.
        run: |
          uv sync --extra dev
          uv run sphinx-build -b html -W docs/source docs/build/html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/build/html

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
