name: Release

# Build and publish the wijjit distribution to PyPI using PyPI Trusted
# Publishing (OIDC) - no API tokens are stored in the repository.
#
# Two ways to run:
#   1. Push a version tag (e.g. `v0.1.0`) -> builds, publishes to PyPI, and
#      creates a GitHub Release from the matching CHANGELOG section.
#   2. Manually via the Actions tab (workflow_dispatch) -> choose `testpypi`
#      for a dry-run upload to TestPyPI, or `pypi` for a real publish.
#
# One-time setup (see RELEASE_PLAN.md Phase 5):
#   - Register a Trusted Publisher on PyPI and TestPyPI for repo
#     thomas-villani/wijjit, workflow `release.yml`, environments `pypi` /
#     `testpypi`.
#   - Create GitHub Actions environments named `pypi` and `testpypi`.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      target:
        description: "Publish target"
        type: choice
        options:
          - testpypi
          - pypi
        default: testpypi

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Build sdist and wheel
        run: uv build

      - name: Check distribution metadata
        run: uvx twine check dist/*

      - name: Smoke-test the built wheel
        # Install the wheel into a clean throwaway env and import it, so a
        # broken artifact fails the build before anything is published.
        run: |
          python -m venv /tmp/smoke
          /tmp/smoke/bin/python -m pip install --upgrade pip
          /tmp/smoke/bin/python -m pip install dist/*.whl
          /tmp/smoke/bin/python -c "import wijjit; print('import OK', wijjit.__version__)"

      - name: Upload dist artifact
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  publish-testpypi:
    name: Publish to TestPyPI
    needs: build
    if: github.event_name == 'workflow_dispatch' && inputs.target == 'testpypi'
    runs-on: ubuntu-latest
    environment: testpypi
    permissions:
      id-token: write # required for OIDC Trusted Publishing
    steps:
      - name: Download dist artifact
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  publish-pypi:
    name: Publish to PyPI
    needs: build
    if: >-
      startsWith(github.ref, 'refs/tags/v') ||
      (github.event_name == 'workflow_dispatch' && inputs.target == 'pypi')
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write # required for OIDC Trusted Publishing
    steps:
      - name: Download dist artifact
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  github-release:
    name: Create GitHub Release
    needs: publish-pypi
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7

      - name: Download dist artifact
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Extract release notes from CHANGELOG
        id: notes
        run: |
          version="${GITHUB_REF_NAME#v}"
          # Pull the section for this version out of CHANGELOG.md (everything
          # between the "## [x.y.z]" heading and the next "## [" heading).
          # Uses literal index() matching to avoid awk regex-bracket escaping
          # differences across awk variants.
          awk -v head="## [$version]" '
            index($0, head) == 1 { capture = 1; next }
            capture && index($0, "## [") == 1 { exit }
            capture { print }
          ' CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "Release $version" > release-notes.md
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          body_path: release-notes.md
          files: dist/*
          draft: false
          prerelease: ${{ contains(github.ref_name, 'a') || contains(github.ref_name, 'b') || contains(github.ref_name, 'rc') }}
